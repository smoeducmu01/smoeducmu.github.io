<style>
    :root {
      --primary:      #1565c0;
      --primary-mid:  #1976d2;
      --primary-light:#42a5f5;
      --gold:         #1565c0;
      --gold-light:   #64b5f6;
      --gold-bg:      #e3f2fd;
      --bg:           #eef4fc;
      --bg-card:      #ffffff;
      --border:       #cce0f5;
      --text:         #0d2340;
      --text-mid:     #1e4070;
      --text-muted:   #5d7fa8;
      --text-light:   #ffffff;
      --radius-lg:    12px;
      --radius-md:    8px;
      --radius-sm:    5px;
      --shadow-sm:    0 1px 3px rgba(21,101,192,.07), 0 2px 8px rgba(21,101,192,.05);
      --shadow-md:    0 3px 12px rgba(21,101,192,.10), 0 1px 3px rgba(21,101,192,.06);
      --shadow-lg:    0 8px 32px rgba(21,101,192,.13);
      /* Legacy aliases */
      --primary-blue: #1976d2;
      --dark-blue:    #1565c0;
      --accent-cyan:  #42a5f5;
      --bg-light:     #eef4fc;
      --text-dark:    #0d2340;
      --border-radius-main: 12px;
      --border-radius-sm:   8px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Anuphan', 'Sarabun', sans-serif; margin: 0; padding: 0; background: var(--bg); display: flex; color: var(--text); font-size: 15px; line-height: 1.65; letter-spacing: 0.01em; }

    /* ================= Sidebar ================= */
    .sidebar {
      width: 248px; height: 100vh;
      background: linear-gradient(180deg, #0d2d6b 0%, #1565c0 55%, #1976d2 100%);
      color: var(--text-light); position: fixed;
      padding: 0 0 24px; box-sizing: border-box;
      box-shadow: 3px 0 20px rgba(0,0,0,0.22); z-index: 160;
      overflow-y: auto; transition: transform 0.3s ease;
      border-right: 1px solid rgba(100,181,246,0.2);
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(100,181,246,0.4); border-radius:99px; }
    .sidebar-header {
      text-align: center; padding: 28px 20px 20px;
      border-bottom: 1px solid rgba(100,181,246,0.2);
      margin-bottom: 10px;
    }
    .sidebar-logo { width: 72px; height: 72px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      padding: 3px; background: rgba(255,255,255,0.06); margin-bottom: 12px; }
    .sidebar h2 { font-size: 13.5px; margin: 0; font-weight: 600; letter-spacing: 0.02em;
      color: rgba(255,255,255,0.9); }
    .sidebar-sub { font-size: 10.5px; color: rgba(179,229,252,0.85); margin-top: 3px;
      letter-spacing: 0.04em; }
    .sidebar-section-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(179,229,252,0.6); padding: 14px 18px 5px; margin: 0;
    }
    .menu-item {
      padding: 10px 18px; cursor: pointer; transition: all 0.2s;
      border-radius: 0; margin: 1px 0; display: flex; align-items: center;
      font-size: 0.88em; font-weight: 500; color: rgba(255,255,255,0.72);
      border-left: 3px solid transparent;
    }
    .menu-item:hover { background: rgba(255,255,255,0.12); color: white;
      border-left-color: rgba(100,181,246,0.6); }
    .menu-item.active { background: rgba(255,255,255,0.18); color: white; font-weight: 700;
      border-left-color: #90caf9; }
    .menu-icon { margin-right: 11px; font-size: 1em; opacity: 0.85; width: 18px; text-align:center; }

    /* ================= Main Content ================= */
    .main-content { margin-left: 248px; padding: 0; width: calc(100% - 248px); box-sizing: border-box; min-height: 100vh; }
    .card { background: white; padding: 0; border-radius: 0; box-shadow: none; border: none; display: none; min-height: 100vh; animation: slideUp 0.35s ease-out; }
    /* mobile perf */
    * { -webkit-tap-highlight-color: transparent; }
    .card, .modal-content { will-change: auto; }
    img { content-visibility: auto; }
    .card.active { display: block; }
    h3.page-title { margin-top: 0; color: var(--dark-blue); font-size: 1.1em; font-weight: 700;
      display: flex; align-items: center; gap: 9px;
      padding-bottom: 12px; margin-bottom: 28px;
      border-bottom: 2px solid #e8edf5;
    }
    h3.page-title::before { content:''; display:inline-block; width:4px; height:18px;
      background: linear-gradient(180deg,#42a5f5,#1565c0); border-radius:2px; flex-shrink:0; }

    /* ================= UI ลูกค้า ================= */
    .order-layout { display: flex; gap: 30px; align-items: flex-start; }
    .product-panel { flex: 2; } .cart-panel { flex: 1; position: sticky; top: 20px; }

    /* PromptPay mode tabs (admin products) */
    .pp-tab { flex:1; min-width:90px; padding:7px 6px; border:2px solid #e2e8f0; border-radius:8px; background:white; color:#64748b; font-weight:700; cursor:pointer; font-size:0.8em; transition:0.15s; }
    .pp-tab.active { border-color:#3b82f6; background:#eff6ff; color:#1d4ed8; }
    .pp-tab:hover:not(.active) { border-color:#93c5fd; background:#f8faff; }
    .buyer-type-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .buyer-tab { flex:1; min-width:90px; padding:10px 6px; border:2px solid #e2e8f0; border-radius:12px; background:white; cursor:pointer; text-align:center; font-size:0.82em; font-weight:700; color:#64748b; transition:0.2s; }
    .buyer-tab .bt-icon { font-size:1.4em; display:block; margin-bottom:3px; }
    .buyer-tab.active { border-color:var(--primary-blue); background:#eff6ff; color:var(--primary-blue); }
    .buyer-tab:hover:not(.active) { border-color:#93c5fd; background:#f0f7ff; }

    /* Shipping method cards */
    .shipping-options { display:flex; flex-direction:column; gap:8px; margin:8px 0 12px; }
    .shipping-card { display:flex; align-items:center; gap:10px; padding:10px 14px; border:2px solid #e2e8f0; border-radius:10px; cursor:pointer; transition:0.2s; background:white; }
    .shipping-card.active { border-color:var(--primary-blue); background:#eff6ff; }
    .shipping-card:hover:not(.active) { border-color:#93c5fd; }
    .shipping-card .sc-icon { font-size:1.3em; }
    .shipping-card .sc-name { font-weight:700; font-size:0.88em; color:#1e293b; flex:1; }
    .shipping-card .sc-fee { font-size:0.82em; font-weight:700; color:var(--primary-blue); }
    .shipping-card .sc-note { font-size:0.75em; color:#64748b; }

    /* Order total summary */
    .order-total-box { background:linear-gradient(135deg,#eff6ff,#f0fdf4); border:1.5px solid #bfdbfe; border-radius:12px; padding:14px 16px; margin:10px 0 14px; }
    .order-total-row { display:flex; justify-content:space-between; font-size:0.88em; margin-bottom:4px; color:#475569; }
    .order-total-row.grand { font-weight:800; font-size:1em; color:var(--dark-blue); margin-top:8px; padding-top:8px; border-top:1px dashed #bfdbfe; }

    /* Special size badge */
    .size-btn { display:inline-flex; flex-direction:column; align-items:center; padding:6px 10px; border:2px solid #e2e8f0; border-radius:8px; cursor:pointer; margin:3px; background:white; min-width:48px; transition:0.15s; }
    .size-btn.active { border-color:var(--primary-blue); background:#eff6ff; }
    .size-btn.special { border-color:#d8b4fe; background:#faf5ff; }
    .size-btn.special.active { border-color:#7c3aed; background:#ede9fe; }
    .size-btn .sz-label { font-weight:700; font-size:0.88em; }
    .size-btn .sz-price { font-size:0.68em; color:#7c3aed; margin-top:1px; }
    /* ===== Premium Product Cards ===== */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 30px;
    }
    @media(max-width:640px){ .product-grid { grid-template-columns: repeat(2,1fr); gap: 10px; } }

    .pcard {
      background: #fff; border-radius: 18px;
      overflow: hidden; cursor: pointer;
      border: 1px solid #f0f2f8;
      box-shadow: 0 2px 12px rgba(13,36,84,0.06);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.22s ease;
      animation: pcardIn 0.4s both;
    }
    @keyframes pcardIn {
      from { opacity:0; transform: translateY(14px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .pcard:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 16px 36px rgba(13,36,84,0.14);
    }
    .pcard:active { transform: scale(0.97); }
    .pcard-disabled { opacity: 0.55; cursor: not-allowed; pointer-events: none; }

    .pcard-img-wrap {
      position: relative; overflow: hidden;
      aspect-ratio: 1 / 1; background: #f7f8fc;
    }
    .pcard-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
      display: block;
    }
    .pcard:hover .pcard-img { transform: scale(1.07); }
    .pcard-no-img {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3em; color: #cbd5e1;
      background: linear-gradient(135deg,#f8fafc,#f1f5f9);
    }
    .pcard-hover-overlay {
      position: absolute; inset: 0;
      background: rgba(13,36,84,0.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.22s;
    }
    .pcard-hover-overlay span {
      color: white; font-weight: 700; font-size: 0.85em;
      padding: 8px 18px; border: 2px solid rgba(255,255,255,0.8);
      border-radius: 30px; letter-spacing: 0.04em;
    }
    .pcard:hover .pcard-hover-overlay { opacity: 1; }

    .pcard-badges {
      position: absolute; top: 8px; left: 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .pbadge {
      font-size: 0.65em; font-weight: 800; padding: 3px 9px;
      border-radius: 30px; letter-spacing: 0.03em; width: fit-content;
    }
    .pbadge-pre  { background: #7c3aed; color: #fff; }
    .pbadge-sold { background: #ef4444; color: #fff; }
    .pbadge-low  { background: #f59e0b; color: #fff; }

    .pcard-body { padding: 12px 14px 14px; }
    .pcard-name {
      font-size: 0.85em; font-weight: 700; color: #1e293b;
      line-height: 1.35; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .pcard-price {
      font-size: 1.05em; font-weight: 800; color: #1565c0;
    }
    .pcard-currency { font-size: 0.75em; font-weight: 600; color: #64748b; }

    .cart-section { background: #f9fbfd; padding: 20px; border-radius: var(--border-radius-main); border: 2px dashed #e0e7ff; }
    .cart-list { max-height: 250px; overflow-y: auto; padding: 0 10px 0 0; margin: 0 0 15px 0; list-style: none; }
    .cart-list li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; font-size: 0.95em; }

    .btn { padding: 9px 20px; border: none; border-radius: var(--radius-sm); cursor: pointer;
      font-family: 'Anuphan','Sarabun',sans-serif; transition: all 0.2s; font-weight: 600; font-size: 0.88em; }
    .btn-add { background: white; color: var(--primary); border: 1.5px solid var(--primary); width: 100%; }
    .btn-add:hover { background: var(--primary); color: white; }
    .btn-details { background: #f4f6fb; color: var(--dark-blue); border: 1px solid #dde2ed; width: 100%; margin-bottom: 8px; padding: 8px; font-size: 0.83em; }
    .btn-details:hover { background: #e8edf5; }
    .btn-submit { background: linear-gradient(135deg, #0d2454 0%, #1e4fa3 100%);
      color: white; width: 100%; padding: 13px; font-size: 0.95em; font-weight: 700; margin-top: 10px;
      border-radius: var(--radius-sm); letter-spacing: 0.02em;
      box-shadow: 0 4px 14px rgba(13,36,84,.22); border:none; cursor:pointer;
      transition: all 0.2s; }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,36,84,.3); }
    .btn-remove { color: #e53e3e; background: #fff5f5; border: 1px solid #fed7d7;
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer; margin-left: 8px;
      display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .btn-remove:hover { background: #fed7d7; }

    input[type="text"], input[type="password"], input[type="email"],
    input[type="number"], input[type="date"], input[type="time"],
    textarea, select {
      width: 100%; padding: 10px 14px; margin-bottom: 11px;
      border: 1.5px solid #dde2ed; border-radius: var(--radius-sm);
      box-sizing: border-box; font-family: 'Anuphan','Sarabun',sans-serif;
      background: #fafbfd; font-size: 0.92em; color: var(--text);
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--primary); outline: none;
      box-shadow: 0 0 0 3px rgba(13,36,84,0.08);
      background: white;
    }

    /* ================= Modal ================= */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
    .modal-content { background: white; padding: 24px; border-radius: var(--border-radius-main); width: 94%; max-width: 560px; max-height: 90vh; overflow-y: auto; position: relative; }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5em; cursor: pointer; color: #999; background: none; border: none; }
    .size-dropdown-container { background: #e8f4fd; padding: 15px; border-radius: var(--border-radius-sm); margin-bottom: 15px; border: 1px solid var(--primary-blue); }

    /* ================= Admin Styles ================= */

    /* --- Login Page --- */
    #page-admin-login { background: linear-gradient(135deg, #0d47a1 0%, #1976d2 60%, #42a5f5 100%) !important; min-height: 80vh; padding: 60px 20px !important; align-items: center; justify-content: center; }
    #page-admin-login.active { display: flex !important; }
    .admin-login-box { background: white; border-radius: 24px; padding: 45px 40px; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.25); text-align: center; }
    .admin-login-box .login-logo { width: 80px; height: 80px; border-radius: 50%; object-fit: contain; background: #f0f6ff; padding: 10px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,123,255,0.15); }
    .admin-login-box h2 { color: var(--dark-blue); margin: 0 0 6px 0; font-size: 1.4em; }
    .admin-login-box p { color: #94a3b8; margin: 0 0 28px 0; font-size: 0.9em; }
    .admin-login-box input { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 13px 16px; transition: border-color 0.2s; }
    .admin-login-box input:focus { border-color: var(--primary-blue); outline: none; }
    .admin-login-box .btn-login { background: linear-gradient(45deg, var(--dark-blue), var(--primary-blue)); color: white; width: 100%; padding: 14px; border-radius: 12px; font-size: 1em; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; margin-top: 8px; }
    .admin-login-box .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,123,255,0.3); }

    /* --- Dashboard --- */
    .admin-dash-header { background: linear-gradient(120deg, var(--dark-blue) 0%, #1565c0 60%, #1976d2 100%); border-radius: 18px; padding: 20px 24px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
    .admin-dash-header h3 { margin: 0; font-size: 1.15em; font-weight: 700; }
    .admin-dash-header p { margin: 4px 0 0 0; opacity: 0.75; font-size: 0.88em; }

    /* --- New grouped menu --- */
    .admin-group { margin-bottom: 16px; }
    .admin-group-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.72em; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      color: #94a3b8; margin-bottom: 10px; padding-bottom: 8px;
      border-bottom: 1.5px solid #f1f5f9;
    }
    .admin-group-label span { font-size: 1.1em; }

    /* Primary action row - big clickable rows */
    .admin-action-list { display: flex; flex-direction: column; gap: 8px; }
    .admin-action-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; border-radius: 14px; cursor: pointer;
      border: 1.5px solid #e8edf5; background: white;
      transition: 0.18s; position: relative; overflow: hidden;
    }
    .admin-action-row:hover { transform: translateX(4px); border-color: #c7d2fe; box-shadow: 0 4px 18px rgba(99,102,241,0.10); }
    .admin-action-row .ar-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3em; flex-shrink: 0;
    }
    .admin-action-row .ar-text { flex: 1; min-width: 0; }
    .admin-action-row .ar-title { font-weight: 700; font-size: 0.92em; color: var(--dark-blue); }
    .admin-action-row .ar-desc  { font-size: 0.76em; color: #94a3b8; margin-top: 1px; }
    .admin-action-row .ar-badge {
      background: #ef4444; color: white; font-size: 0.7em; font-weight: 800;
      padding: 2px 8px; border-radius: 99px; min-width: 22px; text-align: center;
      flex-shrink: 0;
    }
    .admin-action-row .ar-badge.zero { background: #e2e8f0; color: #94a3b8; }
    .admin-action-row .ar-arrow { color: #cbd5e1; font-size: 0.9em; flex-shrink: 0; }

    /* Manage grid - 2-col compact tiles */
    .admin-manage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .admin-manage-tile {
      padding: 14px 12px; border-radius: 12px; cursor: pointer;
      border: 1.5px solid #e8edf5; background: white; text-align: center;
      transition: 0.18s;
    }
    .admin-manage-tile:hover { border-color: #a5b4fc; background: #fafbff; transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.07); }
    .admin-manage-tile .mt-icon { font-size: 1.6em; margin-bottom: 6px; }
    .admin-manage-tile .mt-label { font-size: 0.8em; font-weight: 700; color: var(--dark-blue); }

    /* Settings strip - horizontal compact */
    .admin-settings-strip { display: flex; flex-wrap: wrap; gap: 8px; }
    .admin-setting-chip {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px; border-radius: 10px; cursor: pointer;
      border: 1.5px solid #e8edf5; background: white; font-size: 0.82em;
      font-weight: 600; color: #475569; transition: 0.15s; white-space: nowrap;
    }
    .admin-setting-chip:hover { border-color: #a5b4fc; color: var(--dark-blue); background: #f5f7ff; }
    .btn-logout { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 600; transition: 0.2s; backdrop-filter: blur(4px); }
    .btn-logout:hover { background: rgba(255,107,107,0.8); border-color: transparent; }

    /* old admin-menu-grid kept for legacy, overridden by new grouped layout */
    .admin-menu-grid { display: none; }
    .admin-box { display: none; }

    /* --- Sub-page Top Bar --- */
    .admin-topbar { display: flex; align-items: center; gap: 14px; background: white; border: 1px solid #e8edf5; border-radius: 14px; padding: 14px 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .admin-topbar .btn-back { background: #f1f5f9; color: #475569; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 0.9em; transition: 0.2s; white-space: nowrap; }
    .admin-topbar .btn-back:hover { background: #e2e8f0; }
    .admin-topbar .topbar-title { font-size: 1.15em; font-weight: 700; color: var(--dark-blue); }
    .admin-topbar .topbar-badge { background: #e8f4fd; color: var(--primary-blue); padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 600; margin-left: auto; }

    /* --- Status Badges --- */
    .st-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 700; white-space: nowrap; }
    .st-pending  { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
    .st-approved { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .st-active   { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .st-done     { background: #f3e5f5; color: #6a1b9a; border: 1px solid #ce93d8; }
    .st-cancel   { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

    /* Filter Dropdown (Tracking) */
    .track-filter-wrap { position: relative; display: inline-block; margin: 18px 0 16px 0; }
    .track-filter-btn {
      display: flex; align-items: center; gap: 10px; padding: 10px 18px;
      background: white; border: 2px solid #e2e8f0; border-radius: 30px;
      font-family: 'Kanit', sans-serif; font-size: 0.88em; font-weight: 600;
      color: #475569; cursor: pointer; transition: all 0.18s; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .track-filter-btn:hover { border-color: var(--primary-blue); color: var(--primary-blue); }
    .track-filter-btn .arrow { font-size: 0.7em; transition: transform 0.2s; }
    .track-filter-btn.open { border-color: var(--primary-blue); color: var(--primary-blue); }
    .track-filter-btn.open .arrow { transform: rotate(180deg); }
    .track-filter-menu {
      display: none; position: absolute; top: calc(100% + 8px); left: 0;
      background: white; border-radius: 16px; border: 1px solid #e2e8f0;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12); min-width: 220px; z-index: 100; overflow: hidden;

    /* ===== QR Code styles ===== */

    /* ===== QR Scanner page ===== */
    .scanner-wrap { max-width:480px; margin:0 auto; }
    .scanner-viewfinder { position:relative; border-radius:16px; overflow:hidden; background:#000; aspect-ratio:1/1; }
    .scanner-viewfinder video { width:100%; height:100%; object-fit:cover; display:block; }
    .scanner-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .scanner-frame { width:65%; aspect-ratio:1/1; border:3px solid #60a5fa; border-radius:14px; box-shadow:0 0 0 9999px rgba(0,0,0,0.45); position:relative; }
    .scanner-frame::before, .scanner-frame::after { content:''; position:absolute; width:22px; height:22px; border-color:#60a5fa; border-style:solid; }
    .scanner-frame::before { top:-3px; left:-3px; border-width:4px 0 0 4px; border-radius:4px 0 0 0; }
    .scanner-frame::after  { bottom:-3px; right:-3px; border-width:0 4px 4px 0; border-radius:0 0 4px 0; }
    .scanner-line { position:absolute; left:4%; right:4%; height:2px; background:linear-gradient(90deg,transparent,#60a5fa,transparent); animation:scanLine 2s linear infinite; }
    @keyframes scanLine { 0%{top:5%} 100%{top:90%} }
    .scanner-result-card { border-radius:16px; padding:20px; margin-top:16px; border:1.5px solid #e2e8f0; background:white; }

    /* --- Tables --- */

    .dash-alert-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }

    .tp-order   { background:#e0f2fe; color:#0369a1; }

    .eq-modal-content { background: white; border-radius: 20px; width: 92%; max-width: 640px; max-height: 88vh; overflow-y: auto; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }

    /* ================= CSS ยืมอุปกรณ์ & ฟอร์ม ================= */
    .equip-hero { background: linear-gradient(120deg, #1e4460 0%, #2a6496 55%, #3d88b8 100%); color: white; padding: 25px; border-radius: var(--border-radius-main); margin-bottom: 25px; }
    .equip-section { border: 1px solid #e0e7ff; background: white; padding: 25px; border-radius: var(--border-radius-main); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
    .equip-section h4 { margin-top: 0; color: var(--dark-blue); border-bottom: 2px solid #f0f4f8; padding-bottom: 10px; margin-bottom: 20px; }

      background: white;
      border-left: 5px solid #e2e8f0;
      border-radius: var(--border-radius-main);
      padding: 20px;

      box-shadow: 0 4px 15px rgba(0,0,0,0.04);
      transition: 0.2s;

    .badge-custom { padding: 6px 16px; border-radius: 50px; font-size: 0.85em; font-weight: 700; display: inline-block; color: white; }

    .bg-yellow { background-color: #ffc107; color: #333; }
    .bg-red { background-color: #dc3545; }
    .bg-gray { background-color: #6c757d; }

    /* ================= Calendar Styles ================= */
    .calendar-container { overflow-x: auto; background: white; padding: 20px; border-radius: var(--border-radius-main); border: 1px solid #e0e7ff; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; min-width: 700px; }

    .calendar-cell { border: 1px solid #eef2f7; min-height: 100px; border-radius: 8px; padding: 8px; background: #fff; display: flex; flex-direction: column; gap: 5px; transition: 0.2s; cursor: pointer; position: relative; }

    .event-pending { background: linear-gradient(45deg, #ffc107, #ffca28); color: #333; }

    .org-card { background: #f9fbfd; border: 2px solid #e0e7ff; border-radius: var(--border-radius-main); padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }

    /* ================= Hamburger & Mobile Header ================= */
    .mobile-header {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: #ffffff;
      padding: 0 16px;
      align-items: center; justify-content: space-between;
      height: 60px; box-sizing: border-box;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 1px 12px rgba(0,0,0,0.07);
    }
    .mobile-header-logo {
      display: flex; align-items: center; gap: 10px;
    }
    .mobile-header-logo img {
      width: 34px; height: 34px; border-radius: 10px;
      object-fit: cover;
    }
    .mobile-header-title {
      color: #1e293b; font-weight: 800; font-size: 0.95em;
      letter-spacing: -0.01em; line-height: 1.2;
    }
    .mobile-header-subtitle {
      color: #94a3b8; font-size: 0.68em; font-weight: 500;
    }
    .hamburger-btn {
      background: #f1f5f9; border: none; color: #334155;
      width: 40px; height: 40px; border-radius: 12px; font-size: 1.1em;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: 0.15s; flex-shrink: 0;
    }
    .hamburger-btn:active { background: #e2e8f0; transform: scale(0.95); }

    /* Sidebar Overlay (mobile) */
    .sidebar-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.5);
      z-index: 150; backdrop-filter: blur(2px);
    }
    .sidebar-overlay.show { display: block; }

    /* ================= Bottom Navigation (mobile only) ================= */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 -8px 32px rgba(0,0,0,0.08);
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    }
    .bottom-nav-items {
      display: flex; justify-content: space-around; align-items: center;
      gap: 4px;
    }
    .bottom-nav-item {
      display: flex; flex-direction: column; align-items: center;
      padding: 6px 12px 4px; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 16px; min-width: 56px; gap: 3px;
      color: #94a3b8; font-size: 0.6em; font-weight: 700;
      border: none; background: none; font-family: 'Kanit', sans-serif;
      position: relative; flex: 1; max-width: 72px;
    }
    .bottom-nav-item .nav-icon {
      font-size: 1.45em; line-height: 1;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: block;
    }
    .bottom-nav-item.active {
      color: #1565c0;
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
    }
    .bottom-nav-item.active .nav-icon {
      transform: translateY(-2px) scale(1.15);
    }
    .bottom-nav-item:active { transform: scale(0.92); }

    /* ================= TABLET (641px - 1024px) ================= */
    @media (min-width: 641px) and (max-width: 1024px) {
      .sidebar { width: 220px; padding: 20px 12px; }
      .main-content { margin-left: 220px; width: calc(100% - 220px); padding: 0; }
      .sidebar-logo { width: 60px; }
      .sidebar h2 { font-size: 15px; }
      .card { padding: 0; border-radius: 0; box-shadow: none; border: none; }
      .order-layout { flex-direction: column; }
      .cart-panel { position: static; width: 100%; }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .org-card-container { grid-template-columns: 1fr 1fr; }
      .admin-menu-grid { grid-template-columns: repeat(3, 1fr); }
      .product-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }

    /* ================= MOBILE (max 640px) ================= */
    @media (max-width: 640px) {
      /* Show mobile UI elements */
      .mobile-header { display: flex; }
      .bottom-nav { display: block; }
      /* admin grouped layout mobile */

      .admin-manage-grid { grid-template-columns: repeat(3, 1fr); }
      .admin-setting-chip { font-size: 0.78em; padding: 7px 10px; }

      /* Hide desktop sidebar */
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        width: 280px; z-index: 160;
        padding-top: 70px;
      }
      .sidebar.open {
        transform: translateX(0);
        animation: slideInLeft 0.3s ease;
      }

      /* Push content down for mobile header + up for bottom nav */
      .main-content {
        margin-left: 0 !important;
        width: 100% !important;
        padding: 14px 14px;
        padding-top: 86px !important;
        padding-bottom: 90px !important;
        box-sizing: border-box;
      }

      .card { padding: 0; border-radius: 0; box-shadow: none; border: none; }
      h3.page-title { font-size: 1.1em; margin-bottom: 16px; }

      /* Order page */
      .order-layout { flex-direction: column; gap: 16px; }
      .cart-panel { position: static; width: 100%; }
/* product mobile: handled in .product-grid */
      .cart-section { padding: 14px; }
      .cart-list { max-height: 200px; }

      /* Forms */
      .form-grid { grid-template-columns: 1fr; gap: 0; }
      input[type="text"], input[type="password"], input[type="email"],
      input[type="number"], input[type="date"], textarea, select {
        padding: 10px 12px; font-size: 16px; /* prevent iOS zoom */
        margin-bottom: 10px;
      }
      .btn-submit { font-size: 15px; padding: 12px; }
      .btn { min-height: 44px; } /* touch target */

      /* Equipment */
      .equip-hero { padding: 16px; border-radius: 16px; }
      .equip-hero h2 { font-size: 1.1em; }
      .equip-section { padding: 14px; }
      .org-card-container { grid-template-columns: 1fr 1fr; gap: 10px; }
      .org-card { padding: 14px 8px; }
      .org-card-logo { width: 55px; height: 55px; }
      .org-card h5 { font-size: 0.8em; }
      .equip-row { gap: 6px; }
      .equip-row .input-sm { width: 60px; }

      /* Admin */
      .admin-menu-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .admin-box { padding: 16px 10px; }
      .admin-box span { font-size: 1.8em !important; }
      .admin-box h4 { font-size: 0.85em; margin: 6px 0 0 0; }
      .admin-table { font-size: 0.8em; min-width: 600px; }
      .admin-table th, .admin-table td { padding: 8px 6px; }
      .admin-table-container { border-radius: 12px; }

      /* Modal full-screen on mobile */
      .modal-overlay { align-items: flex-end; }
      .modal-content {
        width: 100% !important; max-width: 100% !important;
        border-radius: 20px 20px 0 0 !important;
        max-height: 90vh; padding: 20px 16px;
        padding-bottom: calc(20px + env(safe-area-inset-bottom));
      }

      /* Calendar */
      .calendar-grid { gap: 4px; }
      .calendar-cell { min-height: 60px; padding: 4px; }
      .calendar-date { font-size: 0.85em; }
      .calendar-event { font-size: 0.65em; padding: 3px 4px; }
      .calendar-day-header { padding: 6px 2px; font-size: 0.75em; }
      .calendar-container { padding: 10px; }

      /* Tracking */
      .track-card { padding: 14px; }

      /* Booking */
      #page-booking > div { padding: 16px !important; }

      /* Products first on mobile, cart below */
      .product-panel { order: 1; }
      .cart-panel { order: 2; }

      /* Sidebar close button */
      .sidebar-close {
        position: absolute; top: 16px; right: 16px;
        background: rgba(255,255,255,0.15); border: none; color: white;
        width: 32px; height: 32px; border-radius: 8px; font-size: 1em;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
      }
    }

    /* ================= Large Desktop (> 1440px) ================= */
    @media (min-width: 1440px) {
      

    }

    /* Center card content on wide screens */
    #page-manage-rooms .admin-form-box,
    #page-manage-rooms .admin-table-container,
    #page-manage-rooms #roomQueueBox {
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    #page-manage-rooms .admin-topbar { margin-bottom: 18px; }

    /* ===== SPLASH SCREEN ===== */
    #splashScreen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(145deg, #0d2d6b 0%, #1565c0 60%, #1976d2 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;

    }
    #splashScreen.fade-out { opacity: 0; pointer-events: none; transform: scale(1.05); }
    .splash-logo-wrap {
      position: relative;
      animation: splashLogoIn 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    .splash-logo { width: 120px; height: 120px; border-radius: 28px;
      box-shadow: 0 0 60px rgba(56,189,248,0.45), 0 0 120px rgba(56,189,248,0.15); }
    .splash-ring {
      position: absolute; inset: -14px; border-radius: 42px;
      border: 2px solid rgba(56,189,248,0.4);
      animation: ringPulse 2s ease-in-out 1.2s infinite;
    }
    .splash-ring2 {
      position: absolute; inset: -28px; border-radius: 54px;
      border: 1.5px solid rgba(56,189,248,0.18);
      animation: ringPulse 2s ease-in-out 1.5s infinite;
    }
    @keyframes splashLogoIn {
      from { opacity:0; transform: scale(0.4) rotate(-10deg); }
      to   { opacity:1; transform: scale(1) rotate(0deg); }
    }
    @keyframes ringPulse {
      0%,100% { opacity:0.4; transform:scale(1); }
      50%     { opacity:1;   transform:scale(1.07); }
    }
    .splash-title {
      margin-top: 28px; color: white; font-size: 1.3em; font-weight: 800; letter-spacing: 0.02em;
      animation: splashUp 0.6s ease 0.9s both;
    }
    .splash-sub {
      margin-top: 5px; color: rgba(187,222,251,0.85); font-size: 0.8em; letter-spacing: 0.07em;
      animation: splashUp 0.6s ease 1.05s both;
    }
    @keyframes splashUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .splash-bar-wrap { margin-top: 50px; width: 180px; animation: splashUp 0.5s ease 1.3s both; }
    .splash-bar-bg { height: 4px; background: rgba(255,255,255,0.1); border-radius:99px; overflow:hidden; }
    .splash-bar-fill { height:100%; width:0%;
      background: linear-gradient(90deg,#90caf9,#42a5f5); border-radius:99px;
      animation: barFill 2s cubic-bezier(0.4,0,0.2,1) 1.5s forwards; }
    @keyframes barFill { 0%{width:0%} 60%{width:72%} 100%{width:100%} }
    .splash-status { margin-top:10px; font-size:0.73em; color:rgba(148,210,250,0.55);
      text-align:center; animation: splashUp 0.5s ease 1.3s both; }
    .splash-dots span { display:inline-block; animation: dotBlink 1.2s infinite; }
    .splash-dots span:nth-child(2){ animation-delay:0.2s; }
    .splash-dots span:nth-child(3){ animation-delay:0.4s; }
    @keyframes dotBlink {
      0%,80%,100%{ opacity:0.2; transform:translateY(0); }
      40%        { opacity:1;   transform:translateY(-3px); }
    }

    /* ===== HOME PAGE ===== */
    /* -- Slideshow -- */
    .home-slideshow {
      position: relative; border-radius: var(--radius-lg); overflow: hidden;
      margin-bottom: 24px; background: #0d2454;
      box-shadow: var(--shadow-md); aspect-ratio: 16/5;
      min-height: 160px;
    }
    .slide-item {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.8s ease;
      background-size: cover; background-position: center;
    }
    .slide-item.active { opacity: 1; z-index: 1; }
    .slide-item::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(to right, rgba(8,24,46,0.45) 0%, rgba(8,24,46,0.08) 45%, transparent 75%);
    }
    .slide-caption {
      position: absolute; bottom: 0; left: 0; z-index: 2;
      padding: 22px 28px; color: white;
    }
    .slide-caption h3 { margin: 0 0 4px; font-size: 1.05em; font-weight: 700;
      text-shadow: 0 1px 8px rgba(0,0,0,0.4); }
    .slide-caption p { margin: 0; font-size: 0.8em; opacity: 0.8; }
    .slide-nav-dots {
      position: absolute; bottom: 12px; right: 16px; z-index: 3;
      display: flex; gap: 6px;
    }
    .slide-dot { width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.35); cursor: pointer; transition: 0.25s;
      border: none; padding: 0;
    }
    .slide-dot.active { background: #90caf9; transform: scale(1.3); }
    .slide-arrow {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 3;
      background: rgba(13,36,84,0.5); color: white; border: 1px solid rgba(201,168,76,0.3);
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 0.9em;
      display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    .slide-arrow:hover { background: rgba(13,36,84,0.85); }
    .slide-arrow.prev { left: 12px; }
    .slide-arrow.next { right: 12px; }
    .slide-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: rgba(201,168,76,0.5); gap: 8px; font-size: 0.85em;
    }

    /* ===== Equipment Availability Calendar (Admin) ===== */
    .eqcal-toolbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:18px; }

    /* ยกเลิก layout เดิม (flex row) */
    .org-layout { display: block; }

    /* ซ่อน sidebar เดิม */
    .org-sidebar { display: none !important; }

    /* --- Tab Bar ด้านบน --- */
    .org-tab-wrap {
      background: #fff; border-bottom: 2px solid #e8edf5;
      position: sticky; top: 0; z-index: 50;
      overflow-x: auto; white-space: nowrap;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .org-tab-wrap::-webkit-scrollbar { display: none; }
    .org-tab-bar {
      display: inline-flex; gap: 0; padding: 0 24px; min-width: 100%;
    }
    .org-tab-item {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 14px 20px; cursor: pointer;
      font-size: 0.88em; font-weight: 600; color: #5d7fa8;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s; white-space: nowrap;
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: inherit;
    }
    .org-tab-item:hover { color: #2a6496; }
    .org-tab-item.active { color: #1e4460; border-bottom-color: #2a6496; font-weight: 800; }
    .org-tab-item .tab-cnt {
      background: #dde9f5; color: #2a6496;
      font-size: 0.72em; font-weight: 800;
      padding: 2px 7px; border-radius: 20px; min-width: 20px; text-align: center;
    }
    .org-tab-item.active .tab-cnt { background: #2a6496; color: white; }

    /* Main Content */
    .org-main { padding: 32px 32px 48px; min-width: 0; }
    @media(max-width:640px) { .org-main { padding: 20px 16px 32px; } }

    /* Department Header */
    .org-dept-header { text-align: center; margin-bottom: 32px; }
    .org-dept-header h3 { font-size: 1.5em; font-weight: 800; color: #1e4460; margin: 0 0 4px; }
    .org-dept-header p  { color: #5ba3cc; font-size: 0.88em; margin: 0; }

    /* Section title */
    .org-section-title {
      font-size: 1.05em; font-weight: 800; color: #1e4460;
      text-align: center; margin: 40px 0 22px;
      display: flex; align-items: center; gap: 12px;
    }
    .org-section-title::before, .org-section-title::after {
      content: ''; flex: 1; height: 1.5px; background: #e0eaf5;
    }

    /* หัวกลุ่มฝ่าย (ย่อย ภายใต้สมาชิกฝ่าย) */
    .org-sub-dept-label {
      text-align: center; margin: 18px 0 12px;
    }
    .org-sub-dept-label span {
      background: #eef5f9; color: #2a6496;
      padding: 5px 20px; border-radius: 20px;
      font-size: .85em; font-weight: 700;
    }

    /* Wrapper ควบคุมความกว้าง max 3 การ์ด */
    .org-cards-wrap {
      display: flex; justify-content: center; margin-bottom: 8px;
    }

    /* Cards grid — เสมอ max 3 คอลัมน์ */
    .org-cards-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 300px));
      gap: 24px;
      justify-content: center;
      width: 100%;
    }
    /* 1 คน — กว้างแค่ 1 card */
    .org-cards-row.n1 { grid-template-columns: minmax(0, 300px); }
    /* 2 คน — กว้างแค่ 2 card */
    .org-cards-row.n2 { grid-template-columns: repeat(2, minmax(0, 300px)); }
    /* 3+ คน — 3 คอลัมน์ */
    .org-cards-row.n3 { grid-template-columns: repeat(3, minmax(0, 300px)); }

    .org-card-wrap { width: 100%; }

    @media(max-width:900px) {
      .org-cards-row,
      .org-cards-row.n3 { grid-template-columns: repeat(2, minmax(0, 300px)); }
      .org-cards-row.n1 { grid-template-columns: minmax(0, 260px); }
    }
    @media(max-width:500px) {
      .org-cards-row,
      .org-cards-row.n2,
      .org-cards-row.n3 { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .org-cards-row.n1 { grid-template-columns: 1fr; }
    }

    /* Individual card */
    .org-member-card {
      background: white; border-radius: 20px;
      border: 1.5px solid #e0eaf5; padding: 32px 20px 24px;
      text-align: center; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34,1.4,0.64,1);
      box-shadow: 0 4px 18px rgba(42,100,150,0.09); width: 100%;
    }
    .org-member-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 48px rgba(42,100,150,0.20);
      border-color: #a0cbea;
    }
    .org-member-card:active { transform: scale(0.97); }

    /* Avatar */
    .org-avatar-wrap { position: relative; display: inline-block; margin-bottom: 18px; }
    .org-avatar-wrap.sz-lg .org-avatar-circle   { width: 150px; height: 150px; }
    .org-avatar-wrap.sz-md .org-avatar-circle   { width: 130px; height: 130px; }
    .org-avatar-wrap.sz-sm .org-avatar-circle   { width: 110px; height: 110px; }
    @media(max-width:640px) {
      .org-avatar-wrap.sz-lg .org-avatar-circle { width: 110px; height: 110px; }
      .org-avatar-wrap.sz-md .org-avatar-circle { width: 95px;  height: 95px; }
      .org-avatar-wrap.sz-sm .org-avatar-circle { width: 85px;  height: 85px; }
    }
    .org-avatar-circle {
      border-radius: 50%; object-fit: cover; display: block;
      border: 5px solid #eef5f9;
      box-shadow: 0 6px 22px rgba(42,100,150,0.18);
      background: linear-gradient(135deg,#2a6496,#3d88b8);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .org-member-card:hover .org-avatar-circle { border-color: #a0cbea; box-shadow: 0 8px 28px rgba(42,100,150,0.28); }
    .org-avatar-placeholder {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg,#2a6496,#3d88b8);
      color: white; font-weight: 800;
      border: 5px solid #eef5f9; box-shadow: 0 6px 22px rgba(42,100,150,0.18);
    }
    .org-avatar-wrap.sz-lg .org-avatar-placeholder { width: 150px; height: 150px; font-size: 3.2em; }
    .org-avatar-wrap.sz-md .org-avatar-placeholder { width: 130px; height: 130px; font-size: 2.8em; }
    .org-avatar-wrap.sz-sm .org-avatar-placeholder { width: 110px; height: 110px; font-size: 2.4em; }
    @media(max-width:640px) {
      .org-avatar-wrap.sz-lg .org-avatar-placeholder { width: 110px; height: 110px; font-size: 2.4em; }
      .org-avatar-wrap.sz-md .org-avatar-placeholder { width: 95px;  height: 95px;  font-size: 2em; }
      .org-avatar-wrap.sz-sm .org-avatar-placeholder { width: 85px;  height: 85px;  font-size: 1.8em; }
    }

    /* ชื่อและตำแหน่ง — ใหญ่ขึ้นชัดขึ้น */
    .org-member-name {
      font-weight: 800; font-size: 1.15em; color: #1e4460;
      line-height: 1.4; margin-bottom: 7px;
    }
    .org-member-pos {
      font-size: 0.86em; color: #5ba3cc;
      line-height: 1.5; margin-bottom: 18px; font-weight: 500;
    }
    .org-more-btn {
      display: inline-block; padding: 8px 28px;
      background: #2a6496; color: white;
      border-radius: 30px; font-size: 0.84em; font-weight: 700;
      transition: background 0.18s, transform 0.15s;
      box-shadow: 0 3px 10px rgba(42,100,150,0.20); letter-spacing: 0.02em;
    }
    .org-member-card:hover .org-more-btn { background: #1e4460; transform: scale(1.04); }

    /* Empty */
    .org-empty-state { text-align: center; padding: 60px 24px; color: #94a3b8; }

    /* Detail Modal */
    /* ===== Org Detail Modal — สไตล์รูปซ้าย ข้อมูลขวา ===== */
    .org-detail-modal-content {
      max-width: 740px; padding: 0 !important; overflow: hidden !important;
      border-radius: 20px !important;
    }
    /* Close button */
    .org-detail-modal-content .close-btn {
      position: absolute; top: 14px; right: 18px;
      color: #94a3b8; font-size: 1.4em; z-index: 10;
      background: #f1f5f9; border: none; border-radius: 50%;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; line-height: 1; transition: background 0.15s, color 0.15s;
    }
    .org-detail-modal-content .close-btn:hover { background: #e2e8f0; color: #1e4460; }

    /* Outer wrapper: ยกเลิก header เดิม ใช้ layout 2 คอลัมน์แทน */
    .org-detail-layout {
      display: flex; align-items: stretch; min-height: 320px;
      position: relative;
    }
    /* ซ้าย: แถบภาพ */
    .org-detail-photo-col {
      width: 220px; flex-shrink: 0;
      background: linear-gradient(160deg, #1e4460 0%, #2a6496 55%, #3d88b8 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 36px 20px 28px; gap: 0;
      border-radius: 20px 0 0 20px;
    }
    /* รูปโปรไฟล์ */
    .org-detail-avatar {
      width: 160px; height: 160px; border-radius: 50%; object-fit: cover;
      border: 5px solid rgba(255,255,255,0.55);
      box-shadow: 0 8px 28px rgba(0,0,0,0.28);
      display: block;
    }
    .org-detail-avatar-placeholder {
      width: 160px; height: 160px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.15);
      color: white; font-size: 3.5em; font-weight: 800;
      border: 5px solid rgba(255,255,255,0.45);
      box-shadow: 0 8px 28px rgba(0,0,0,0.22);
    }
    /* ขวา: ข้อมูล */
    .org-detail-body {
      flex: 1; padding: 32px 32px 28px; min-width: 0;
      display: flex; flex-direction: column; justify-content: center;
    }
    .org-detail-name {
      font-size: 1.4em; font-weight: 800; color: #1e4460;
      margin: 0 0 5px; line-height: 1.3;
    }
    .org-detail-pos {
      font-size: 0.9em; color: #5ba3cc; margin: 0 0 22px; font-weight: 500;
    }
    .org-detail-row {
      display: flex; gap: 14px; padding: 10px 0;
      border-bottom: 1px solid #f0f6fb; font-size: 0.9em; align-items: flex-start;
    }
    .org-detail-row:last-child { border-bottom: none; }
    .org-detail-label {
      width: 90px; flex-shrink: 0;
      color: #5ba3cc; font-weight: 700; font-size: 0.92em;
    }
    .org-detail-value { color: #1e4460; font-weight: 500; flex: 1; }
    .org-detail-value a { color: #2a6496; text-decoration: none; font-weight: 600; }
    .org-detail-value a:hover { text-decoration: underline; }

    /* Mobile: stack vertically */
    @media(max-width: 560px) {
      .org-detail-layout { flex-direction: column; }
      .org-detail-photo-col {
        width: 100%; border-radius: 20px 20px 0 0; padding: 28px 20px 20px;
      }
      .org-detail-avatar, .org-detail-avatar-placeholder { width: 120px; height: 120px; font-size: 2.8em; }
      .org-detail-body { padding: 20px 20px 24px; }
    }

    /* Admin Manage Org */
    .org-admin-search { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .org-admin-search input {
      flex: 1; min-width: 200px; padding: 9px 14px;
      border: 1.5px solid #e8edf5; border-radius: 10px;
      font-family: inherit; font-size: 0.88em; margin: 0;
    }
    .org-admin-search input:focus { border-color: #3d88b8; outline: none; }

    /* ===== FAQ Page ===== */
    .faq-search-wrap { position:relative; margin-bottom:18px; }
    .faq-search-wrap input { padding-left: 40px !important; }
    .faq-search-wrap::before { content:'🔍'; position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:1em; }
    .faq-cat-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
    .faq-tab {
      padding: 6px 16px; border-radius: 20px; border: 1px solid #dde2ed;
      background: white; color: var(--text-muted); font-size:0.82em; font-weight:600;
      cursor: pointer; transition: all 0.15s;
    }
    .faq-tab.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
    .faq-item {
      background: white; border-radius: 12px; margin-bottom: 10px;
      border: 1px solid #e8edf5; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .faq-q {
      padding: 15px 18px; cursor: pointer; display: flex;
      justify-content: space-between; align-items: center; gap: 12px;
      font-weight: 600; font-size: 0.9em; color: var(--dark-blue);
      user-select: none; transition: background 0.15s;
    }
    .faq-q:hover { background: #f8faff; }
    .faq-q.open { background: #f0f6ff; color: var(--primary-blue); }
    .faq-q .faq-arrow { font-size: 0.7em; transition: transform 0.25s; flex-shrink:0; color: var(--text-muted); }
    .faq-q.open .faq-arrow { transform: rotate(180deg); color: var(--primary-blue); }
    .faq-a {
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
      padding: 0 18px; font-size: 0.88em; color: #475569; line-height: 1.7;
    }
    .faq-a.open { max-height: 400px; padding: 0 18px 15px; }
    .faq-a ul { margin: 8px 0 0; padding-left: 18px; }
    .faq-a li { margin-bottom: 4px; }
    .faq-cat-label {
      font-size: 0.7em; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin: 18px 0 10px; display: flex; align-items: center; gap: 8px;
    }
    .faq-cat-label::before { content:''; width:3px; height:12px;
      background: linear-gradient(180deg,#42a5f5,#1565c0); border-radius:2px; }
    .faq-empty { text-align:center; color: var(--text-muted); padding: 30px; font-size:0.9em; }

    /* ===== Contact Page ===== */
    .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
    @media(max-width:560px){ .contact-grid { grid-template-columns:1fr; } }
    .contact-card {
      background: white; border-radius: 14px; padding: 20px 18px;
      border: 1px solid #e8edf5; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer;
      transition: all 0.18s; text-decoration: none; display:block;
    }
    .contact-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(13,36,84,0.12); }
    .contact-card .cc-icon { font-size: 2.2em; margin-bottom: 10px; }
    .contact-card .cc-title { font-weight: 700; color: var(--dark-blue); font-size: 0.9em; margin-bottom: 4px; }
    .contact-card .cc-desc  { font-size: 0.78em; color: var(--text-muted); line-height: 1.5; }
    .contact-form-wrap {
      background: white; border-radius: 14px; padding: 22px 20px;
      border: 1px solid #e8edf5; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .contact-form-wrap h4 { margin: 0 0 16px; color: var(--dark-blue); font-size:0.95em; }
    .contact-type-select { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .ctype-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid #dde2ed;
      background: white; color: var(--text-muted); font-size:0.8em; font-weight:600;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .ctype-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
    .contact-sent { text-align:center; padding: 24px; display:none; }
    .contact-sent .cs-icon { font-size: 3em; margin-bottom: 10px; }

    /* ===== Tracking improvements ===== */
    .track-status-bar {
      display: flex; gap: 0; border-radius: 10px; overflow: hidden;
      margin-bottom: 18px; border: 1px solid #e8edf5;
    }
    .tsb-item {
      flex: 1; text-align: center; padding: 12px 6px 10px;
      cursor: pointer; transition: background 0.15s; background: white;
      border-right: 1px solid #e8edf5; font-size: 0.78em;
    }
    .tsb-item:last-child { border-right: none; }
    .tsb-item:hover { background: #f0f6ff; }
    .tsb-item.active { background: var(--primary-blue); color: white; }
    .tsb-item .tsb-icon { font-size: 1.3em; display:block; margin-bottom:3px; }
    .tsb-item .tsb-count { font-weight:700; font-size:1.1em; display:block; }
    .tsb-item .tsb-label { opacity: 0.8; font-size: 0.9em; }
    .track-card { border-radius: 14px; padding: 18px; margin-bottom: 12px; border: 1px solid; }
    .track-card .tc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 10px; gap:10px; }
    .tc-type-badge { font-size:0.75em; font-weight:700; color: var(--text-muted); }
    .tc-progress {
      display: flex; gap: 0; margin: 12px 0; border-radius: 6px; overflow:hidden; height: 6px;
    }
    .tc-progress-seg { flex:1; background: #e8edf5; }
    .tc-progress-seg.filled-yellow { background: #f59e0b; }
    .tc-progress-seg.filled-green  { background: #22c55e; }
    .tc-progress-seg.filled-red    { background: #ef4444; }

    /* ===== Home quick info strip ===== */
    .home-info-strip {
      display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .his-item {
      flex: 1; min-width: 130px; background: white; border-radius: 10px;
      padding: 12px 14px; border: 1px solid #e8edf5;
      display: flex; align-items: center; gap: 10px; font-size: 0.82em;
    }
    .his-icon { font-size: 1.4em; flex-shrink:0; }
    .his-text strong { display:block; color: var(--dark-blue); font-size:0.9em; }
    .his-text span { color: var(--text-muted); font-size:0.85em; }

    /* ===== Mobile improvements ===== */
    @media(max-width:640px){
      .card { padding: 0; }
      input[type=text], input[type=email], input[type=tel], select, textarea {
        font-size: 16px !important; /* prevent iOS zoom */
      }
      .track-status-bar { border-radius: 8px; }
      .tsb-item { padding: 10px 4px 8px; }
      .tsb-item .tsb-icon { font-size:1.1em; }
      .home-info-strip { gap: 8px; }
      .his-item { min-width: 100px; padding: 10px 12px; }
      #searchTrackInput { font-size: 16px !important; }
      .contact-form-wrap { padding: 16px 14px; }
      .faq-q { padding: 13px 14px; font-size: 0.85em; }
    }

    /* ===== Admin Inbox (Contact Messages) ===== */
    .msg-filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
    .msg-filter-btn { padding:6px 16px; border-radius:20px; border:1px solid #dde2ed; background:white;
      font-size:0.82em; font-weight:600; cursor:pointer; transition:all 0.2s; color:var(--text-muted); font-family:inherit; }
    .msg-filter-btn.active { background:var(--primary); color:white; border-color:var(--primary); }
    .msg-filter-btn:hover:not(.active) { border-color:var(--primary); color:var(--primary); }
    .msg-card { background:white; border:1px solid var(--border); border-radius:var(--radius-md);
      padding:16px 18px; margin-bottom:10px; transition:all 0.2s; position:relative;
      border-left:4px solid #e2e8f0; }
    .msg-card:hover { box-shadow:var(--shadow-md); }
    .msg-card.status-new  { border-left-color:#f59e0b; background:#fffdf5; }
    .msg-card.status-read { border-left-color:#60a5fa; }
    .msg-card.status-done { border-left-color:#34d399; }
    .msg-card-header { display:flex; align-items:flex-start; gap:12px; margin-bottom:8px; }
    .msg-card-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#1565c0,#42a5f5);
      display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:0.95em; flex-shrink:0; }
    .msg-card-info { flex:1; min-width:0; }
    .msg-card-name { font-weight:700; font-size:0.93em; color:var(--text); }
    .msg-card-meta { font-size:0.78em; color:var(--text-muted); margin-top:2px; display:flex; gap:10px; flex-wrap:wrap; }
    .msg-card-meta a { color:var(--primary); text-decoration:none; }
    .msg-card-meta a:hover { text-decoration:underline; }
    .msg-card-type { font-size:0.75em; font-weight:700; padding:2px 10px; border-radius:20px;
      background:#e3f2fd; color:#1565c0; white-space:nowrap; }
    .msg-card-actions { display:flex; gap:6px; flex-wrap:wrap; margin-left:auto; }
    .msg-card-body { font-size:0.87em; color:var(--text-mid); line-height:1.65; padding:8px 12px;
      background:#f8faff; border-radius:6px; margin-bottom:10px; white-space:pre-wrap; word-break:break-word; }
    .msg-card-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .msg-status-badge { font-size:0.75em; font-weight:700; padding:3px 12px; border-radius:20px; }
    .msg-status-badge.new  { background:#fef3c7; color:#92400e; }
    .msg-status-badge.read { background:#dbeafe; color:#1e40af; }
    .msg-status-badge.done { background:#d1fae5; color:#065f46; }
    .msg-timestamp { font-size:0.75em; color:var(--text-muted); }
    .msg-empty { text-align:center; padding:48px 20px; color:var(--text-muted); }
    .msg-empty-icon { font-size:2.5em; margin-bottom:10px; }
    .msg-count-chip { background:#e3f2fd; color:#1565c0; padding:2px 8px; border-radius:12px;
      font-size:0.78em; font-weight:700; margin-left:6px; }

    /* ===== Inline Reply Box ===== */

    .faq-admin-order { font-size: 0.75em; color: var(--text-muted); margin-top: 3px; }

    /* ===== Pickup Counter ===== */
    .pickup-search-wrap { position: relative; margin-bottom: 20px; }
    .pickup-search-input {
      width: 100%; padding: 14px 18px 14px 46px;
      border: 2px solid var(--border); border-radius: 12px;
      font-family: 'Anuphan','Sarabun',sans-serif; font-size: 1em;
      background: #f8fbff; color: var(--text); transition: border-color 0.2s;

    }
    .pickup-search-input:focus { border-color: var(--primary); outline: none; background: white; }
    .pickup-search-icon {
      position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
      font-size: 1.15em; color: var(--text-muted); pointer-events: none;
    }
    .pickup-search-clear {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);

      cursor: pointer; font-size: 0.8em; display: none; align-items: center;
      justify-content: center; color: #64748b;
    }
    .pickup-hint { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.92em; }
    .pickup-hint .hint-icon { font-size: 2.5em; display: block; margin-bottom: 12px; }
    .pickup-results-count { font-size: 0.82em; color: var(--text-muted); margin-bottom: 14px; }
    .pickup-filter-chip {
      padding: 5px 12px; border-radius: 20px; border: 1.5px solid #e2e8f0;

      font-weight: 600; cursor: pointer; transition: 0.15s; white-space: nowrap;
    }
    .pickup-filter-chip:hover { border-color: #94a3b8; color: #334155; }
    .pickup-filter-chip.active { background: #1a3a6b; color: white; border-color: #1a3a6b; }
    .pickup-card {
      background: white; border: 1.5px solid var(--border); border-radius: 14px;
      padding: 0; margin-bottom: 14px; box-shadow: var(--shadow-sm);
      overflow: hidden; transition: box-shadow 0.2s;
    }
    .pickup-card:hover { box-shadow: var(--shadow-md); }
    .pickup-card-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; background: #f8fbff;
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .pickup-order-id {
      background: #e3f2fd; color: var(--primary);
      padding: 3px 10px; border-radius: 8px; font-size: 0.82em; font-weight: 700;
      font-family: monospace; letter-spacing: 0.03em;
    }
    .pickup-customer-name { font-weight: 700; font-size: 1em; color: var(--text); flex: 1; }
    .pickup-status-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.78em; font-weight: 700; }
    .pickup-card-body { padding: 14px 18px; }
    .pickup-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 14px; }
    @media (max-width: 600px) { .pickup-info-grid { grid-template-columns: 1fr; } }
    .pickup-info-item { display: flex; align-items: flex-start; gap: 7px; font-size: 0.87em; }
    .pickup-info-label { color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .pickup-info-value { color: var(--text); font-weight: 600; }
    .pickup-items-box {
      background: #f8fbff; border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
    }
    .pickup-items-title {
      font-size: 0.8em; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px;
    }
    .pickup-item-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0; font-size: 0.9em; border-bottom: 1px dashed #e8edf5;
    }
    .pickup-item-row:last-child { border-bottom: none; }
    .pickup-total-row {
      display: flex; justify-content: flex-end; gap: 8px; align-items: center;
      padding-top: 8px; margin-top: 4px; border-top: 2px solid var(--border);
      font-weight: 800; color: var(--primary); font-size: 1em;
    }
    .pickup-action-row {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      padding: 12px 18px; background: #fafbff; border-top: 1px solid var(--border);
    }
    .pickup-status-select {
      flex: 1; min-width: 160px; padding: 8px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: 'Anuphan','Sarabun',sans-serif; font-size: 0.9em;
      background: white; cursor: pointer;
    }
    .pickup-status-select:focus { border-color: var(--primary); outline: none; }
    .btn-pickup-confirm {
      background: linear-gradient(135deg, #0d2454 0%, #1e4fa3 100%);

      font-family: 'Anuphan','Sarabun',sans-serif; font-size: 0.9em; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
    }
    .btn-pickup-confirm:hover { opacity: 0.88; }
    .btn-pickup-confirm:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-slip-link {
      background: #dcfce7; color: #166534; border: none; border-radius: 8px;

      font-weight: 600; white-space: nowrap; display: inline-flex; align-items: center;
    }
    .pickup-notify-result { font-size: 0.8em; padding: 0 18px 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .notify-chip { padding: 3px 10px; border-radius: 20px; font-weight: 700; font-size: 0.88em; }
    .notify-chip.ok   { background: #dcfce7; color: #14532d; }
    .notify-chip.fail { background: #fee2e2; color: #991b1b; }
    .notify-chip.skip { background: #f1f5f9; color: #64748b; }

    /* ===== Jersey Big Item Badge ===== */
    .jersey-items-wrap { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0 14px; }

      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);

      width: 20px; height: 20px; cursor: pointer; accent-color: #15803d;

    /* ===== Summary Panel ===== */

    /* ===== Fixed Cart Panel ===== */    #pickupCartPanel {
      font-family: 'Anuphan','Sarabun',sans-serif;
    }

    @media (max-width: 768px) {
      #pickupCartPanel { left: 0 !important; }
    }
    /* Push page content up when cart is open so last card isn't hidden */
    body.cart-open #page-pickup-counter {
      padding-bottom: 340px;
    }
    body.cart-closed #page-pickup-counter {
      padding-bottom: 60px;
    }
    /* Cart items in body scroll independently */
    #cartItemsList::-webkit-scrollbar { width: 4px; height: 4px; }
    #cartItemsList::-webkit-scrollbar-thumb { background: #86efac; border-radius: 4px; }

    .bulk-action-bar {
      position: sticky; bottom: 16px; z-index: 50;

      padding: 14px 20px; margin-top: 16px;
      display: none; align-items: center; gap: 14px; flex-wrap: wrap;
      box-shadow: 0 8px 28px rgba(21,128,61,0.35);

      border-radius: 8px; padding: 7px 14px;

    }
  
    /* ===== Auto-fill from LINE ===== */
    .line-autofill-banner {
      display: flex; align-items: center; gap: 12px;

    /* ===== Product image lightbox ===== */
    #imgLightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;

      align-items: center; justify-content: center;

    #modalImages img {

    /* ==========================================
       SHOP PAGE REDESIGN
    ========================================== */

    /* Hero banner - ร้านค้า */
    .shop-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1565c0 100%);
      border-radius: 22px; padding: 28px 28px 24px;
      margin-bottom: 28px; position: relative; overflow: hidden;
    }
    .shop-hero::before {
      content: ''; position: absolute; right: -40px; top: -40px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .shop-hero::after {
      content: ''; position: absolute; right: 60px; bottom: -60px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(99,179,237,0.08);
    }
    .shop-hero h2 {
      margin: 0 0 6px; font-size: 1.4em; font-weight: 900;
      color: white; letter-spacing: -0.02em;
    }
    .shop-hero p { margin: 0; color: rgba(255,255,255,0.65); font-size: 0.85em; }
    .shop-hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px; padding: 5px 14px; font-size: 0.75em;
      color: rgba(255,255,255,0.8); font-weight: 600; margin-bottom: 14px;

      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));

    }
    @media(max-width:640px){
      #productGallery.product-grid { grid-template-columns: repeat(2,1fr); gap: 10px; }
    }

    /* ==========================================
       FLOATING CART
    ========================================== */
    .cart-panel { display: none !important; } /* ซ่อน cart panel เดิม */

    #floatingCartBtn {
      position: fixed; bottom: 90px; right: 20px; z-index: 500;
      background: linear-gradient(135deg, #1565c0, #0891b2);
      color: white; border: none; border-radius: 20px;
      padding: 12px 18px; cursor: pointer; font-family: inherit;
      display: none; /* แสดงเฉพาะหน้า order */
      align-items: center; gap: 10px;
      box-shadow: 0 8px 28px rgba(21,101,192,0.45);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
    }
    #floatingCartBtn:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(21,101,192,0.55); }
    #floatingCartBtn:active { transform: scale(0.95); }
    #floatingCartBtn.has-items { display: flex; }
    #floatCartCount {
      background: #ef4444; color: white;
      border-radius: 50%; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75em; font-weight: 800; flex-shrink: 0;
    }
    #floatCartTotal { font-weight: 700; font-size: 0.92em; }

    /* cart drawer */
    #cartDrawer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 600;
      background: white;
      border-radius: 24px 24px 0 0;
      box-shadow: 0 -12px 48px rgba(0,0,0,0.18);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90vh; overflow-y: auto;
      padding: 0 0 env(safe-area-inset-bottom);
    }
    #cartDrawer.open { transform: translateY(0); }
    #cartDrawerOverlay {
      display: none; position: fixed; inset: 0; z-index: 590;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(3px);
    }
    #cartDrawerOverlay.show { display: block; }
    .cart-drawer-handle {
      width: 40px; height: 5px; background: #e2e8f0;
      border-radius: 99px; margin: 12px auto 0;
    }
    .cart-drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #f1f5f9;
      position: sticky; top: 0; background: white; z-index: 1;
    }
    .cart-drawer-header h3 {
      margin: 0; font-size: 1em; font-weight: 800; color: #1e293b;
    }
    .cart-drawer-close {
      background: #f1f5f9; border: none; border-radius: 50%;
      width: 32px; height: 32px; cursor: pointer; font-size: 1em;
      display: flex; align-items: center; justify-content: center;
    }
    .cart-drawer-body { padding: 12px 20px 20px; }

    @media(min-width:641px){
      #floatingCartBtn { bottom: 30px; right: 30px; }
      #cartDrawer {
        left: auto; right: 20px; bottom: 90px;
        border-radius: 20px; max-height: 70vh; width: 360px;
        transform: scale(0.95) translateY(20px);
        transform-origin: bottom right;
        opacity: 0; pointer-events: none;
        transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
      }
      #cartDrawer.open {
        transform: scale(1) translateY(0);
        opacity: 1; pointer-events: auto;
      }
      #cartDrawerOverlay { display: none !important; }
    }

  
    /* ── Inner page padding ── */
    .card.active > *:first-child { /* ไม่ใส่ padding ที่ top-level div */ }

    /* ทุก admin + user page มี padding ภายใน */

    #page-order,
    #page-tracking, #page-faq, #page-contact,
    #page-equipment, #page-booking, #page-calendar,

    /* admin-login — center box พิเศษ */

    /* หน้าสั่งซื้อ — hero ไม่มี padding */

    /* mobile inner padding */

      #page-equipment, #page-booking, #page-calendar,

      #page-manage-accounts, #page-manage-line-admins,
      #page-manage-line-templates, #page-manage-line-users,
      #page-overdue-settings, #page-audit-log, #page-qr-scanner,
      #page-manage-messages, #page-manage-faq, #page-manage-slides,
      #page-equip-calendar, #page-pickup-counter,

    /* ===== Home Split Layout (Facebook + Menu) ===== */
    .home-split-layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }
    .home-fb-box {
      background: white;
      border-radius: 16px;
      border: 1.5px solid #eef0f6;
      box-shadow: 0 2px 10px rgba(13,36,84,0.06);
      overflow: hidden;
      position: sticky;
      top: 16px;
    }
    .home-fb-header {
      padding: 13px 16px 11px;
      font-weight: 700;
      font-size: 0.88em;
      color: var(--text);
      border-bottom: 1.5px solid #eef0f6;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fbff;
    }
    .home-fb-frame {
      display: block;
      width: 100%;
      min-height: 600px;
      border: none;
    }
    .home-section-title {
      font-weight: 700;
      font-size: 0.97em;
      color: var(--text);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .home-split-layout .home-menu-grid {
      grid-template-columns: repeat(4, 1fr) !important;
    }
    @media(max-width:960px) {
      .home-split-layout { 
        display: flex; 
        flex-direction: column; 
      }
      .home-fb-box { 
        position: static; 
        order: 2; /* ดันลงไปด้านล่าง */
        width: 100%;
      }
      .home-split-layout > div:not(.home-fb-box) {
        order: 1; /* ดึงเมนูบริการขึ้นมาด้านบน */
        width: 100%;
      }
      .home-fb-frame { min-height: 480px; }
      .home-split-layout .home-menu-grid { grid-template-columns: repeat(4, 1fr) !important; }
    }

    @media(max-width:640px) {
      .home-split-layout .home-menu-grid { grid-template-columns: repeat(4, 1fr) !important; }
      .home-fb-frame { min-height: 420px; }
    }

  /* ============================================================
     🎨 THEME — Sky Blue สโมสรนักศึกษา
     ============================================================ */

  /* ── 1. CSS Variables (override all) ── */
  :root {
    --primary:       #3d88b8;
    --primary-mid:   #4a96c8;
    --primary-light: #7ec4e0;
    --gold:          #5ba3cc;
    --gold-light:    #b0d4e8;
    --gold-bg:       #eef5f9;
    --bg:            #eef5f9;
    --bg-card:       #ffffff;
    --border:        #b0d4e8;
    --text:          #1a3a4a;
    --text-mid:      #2a6496;
    --text-muted:    #5ba3cc;
    --text-light:    #ffffff;
    --primary-blue:  #4a96c8;
    --dark-blue:     #2a6496;
    --accent-cyan:   #7ec4e0;
    --bg-light:      #eef5f9;
    --text-dark:     #1a3a4a;
  }

  /* ── 2. Body Background ── */
  body {
    background:
      radial-gradient(circle, #b0d4e8 1.5px, transparent 1.5px),
      linear-gradient(160deg, #e8f3f8 0%, #eef5f9 50%, #e4f0f6 100%);
    background-size: 28px 28px, 100% 100%;
  }

  /* ── 3. Sidebar ── */
  .sidebar {
    background: linear-gradient(180deg,
      #2a6496 0%,
      #3d88b8 45%,
      #5ba3cc 85%,
      #7ec4e0 100%);
    box-shadow: 4px 0 24px rgba(45,100,150,0.22);
    border-right: 1px solid rgba(193,223,245,0.35);
  }
  .sidebar-header { border-bottom: 1px solid rgba(193,223,245,0.35); }
  .sidebar-logo { border: 2.5px solid rgba(255,255,255,0.55); }
  .menu-item.active { background: rgba(255,255,255,0.28); border-left-color: #fff; }
  .menu-item:hover  { background: rgba(255,255,255,0.18); border-left-color: rgba(255,255,255,0.7); }

  /* ── 4. Page wrapper background — subtle blobs ── */
  .main-content {
    background: transparent;
  }

  /* ── 5. Home hero banner ── */
  #page-home .home-hero {
    background: linear-gradient(135deg,
      #1a3a4a 0%, #2a6496 40%,
      #3d88b8 80%, #5ba3cc 100%);
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(30,68,96,0.35);
    position: relative; overflow: hidden;
  }
  #page-home .home-hero::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(201,168,76,0.12);
  }
  #page-home .home-hero::after {
    content: ''; position: absolute; bottom: -20px; right: 80px;
    width: 100px; height: 100px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }

  /* ── 6. Home cards ── */
  .home-card {
    border-radius: 20px;
    border: 1.5px solid #b0d4e8;
    box-shadow: 0 3px 14px rgba(45,100,150,0.10);
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .home-card:hover {
    box-shadow: 0 10px 30px rgba(45,100,150,0.22);
    border-color: #5ba3cc;
  }
  .home-card .hc-label { color: #1a3a4a; }
  .home-card .hc-desc  { color: #5ba3cc; }

  /* ── 7. Page title bar ── */
  h3.page-title::before {
    background: linear-gradient(180deg, #5ba3cc, #3d88b8);
  }

  /* ── 8. Buttons ── */
  .btn-submit {
    background: linear-gradient(135deg, #2a6496 0%, #3d88b8 100%);
    box-shadow: 0 4px 14px rgba(45,100,150,0.30);
    border-radius: 12px;
  }
  .btn-submit:hover { box-shadow: 0 6px 20px rgba(45,100,150,0.42); }

  .btn-add    { border-color: #3d88b8; color: #2a6496; border-radius: 10px; }
  .btn-add:hover { background: #3d88b8; color: white; }

  /* ── 9. Admin Login page ── */

    background: linear-gradient(135deg,
      #2a6496 0%, #3d88b8 50%, #7ec4e0 100%) !important;

  /* ── Dropdown parent ── */
  .topnav-nav-strip .has-dropdown {
    position: relative;

    width: 10px; height: 10px;

  /* ── Dropdown panel ── */
  .nav-dropdown {
    display: none;
    position: absolute;
    top: calc(100% - 2px);
    left: 0;
    min-width: 200px;
